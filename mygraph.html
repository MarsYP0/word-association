<!DOCTYPE html>
<html>
<head>
  <title>Word Graph — 我的图谱</title>
  <meta charset="utf-8">
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    .header {
      padding: 0 20px; height: 54px; background: white;
      border-bottom: 1px solid #e0e0e0; display: flex; align-items: center;
      gap: 14px; flex-shrink: 0; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .brand { font-size: 16px; font-weight: 700; color: #333; text-decoration: none; }
    .nav-links { display: flex; gap: 16px; flex: 1; }
    .nav-links a { font-size: 13px; color: #555; text-decoration: none; }
    .nav-links a:hover { color: #4CAF50; }
    .nav-links a.active { color: #4CAF50; font-weight: 600; }
    #status { font-size: 13px; color: #888; }
    .hdr-btn {
      padding: 6px 14px; border-radius: 16px; border: none; cursor: pointer;
      font-size: 13px; white-space: nowrap;
    }
    .hdr-btn-green { background: #4CAF50; color: white; }
    .hdr-btn-green:hover { background: #43a047; }
    .hdr-btn-outline { background: white; color: #555; border: 1px solid #d0d0d0; }
    .hdr-btn-outline:hover { border-color: #4CAF50; color: #4CAF50; }
    .username { font-size: 13px; color: #333; font-weight: 600; }
    .logout-btn { font-size: 13px; color: #888; cursor: pointer; background: none; border: none; }
    .logout-btn:hover { color: #E74C3C; }

    /* ── Layout ── */
    .main { display: flex; flex: 1; overflow: hidden; }
    #graph { flex: 1; position: relative; }

    /* ── Hover tooltip ── */
    .tooltip {
      position: fixed; background: rgba(30,30,30,0.88); color: white;
      padding: 8px 13px; border-radius: 8px; font-size: 13px;
      pointer-events: none; display: none; max-width: 260px;
      z-index: 100; line-height: 1.5;
    }

    /* ── Node info panel ── */
    .info-panel {
      width: 260px; background: white; border-left: 1px solid #e0e0e0;
      padding: 20px; display: none; flex-direction: column; gap: 12px;
      overflow-y: auto; flex-shrink: 0;
    }
    .info-panel.open { display: flex; }
    .panel-close { align-self: flex-end; cursor: pointer; color: #aaa; font-size: 18px; background: none; border: none; }
    .panel-close:hover { color: #333; }
    .panel-word { font-size: 26px; font-weight: 700; color: #1565C0; }
    .panel-def { font-size: 14px; color: #555; line-height: 1.6; }
    .panel-def.empty { color: #bbb; font-style: italic; }
    .panel-divider { border: none; border-top: 1px solid #f0f0f0; }
    .mastered-btn {
      padding: 10px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 600; transition: all 0.2s;
    }
    .mastered-btn.not-mastered { background: #e8f5e9; color: #388e3c; }
    .mastered-btn.not-mastered:hover { background: #c8e6c9; }
    .mastered-btn.mastered { background: #f5f5f5; color: #888; }
    .mastered-btn.mastered:hover { background: #ffebee; color: #c62828; }
    .explore-btn {
      padding: 9px; border-radius: 8px; border: 1px solid #d0d0d0;
      background: white; cursor: pointer; font-size: 13px; color: #555;
      text-decoration: none; display: block; text-align: center;
    }
    .explore-btn:hover { border-color: #4CAF50; color: #4CAF50; }

    /* Connect-from-panel inline form */
    .connect-form { display: none; flex-direction: column; gap: 8px; background: #f9f9f9; border-radius: 10px; padding: 12px; }
    .connect-form.open { display: flex; }
    .connect-form label { font-size: 12px; color: #777; }
    .connect-form select { padding: 7px 10px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 13px; outline: none; }
    .connect-form-actions { display: flex; gap: 8px; }
    .btn-sm-green { flex: 1; padding: 8px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-sm-green:hover { background: #43a047; }
    .btn-sm-gray  { flex: 1; padding: 8px; background: #f0f0f0; color: #555; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-sm-gray:hover { background: #e0e0e0; }

    /* ── Edge floating panel ── */
    .edge-panel {
      position: fixed; background: white; border: 1px solid #e0e0e0;
      border-radius: 12px; padding: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      display: none; flex-direction: column; gap: 10px; z-index: 200; min-width: 220px;
    }
    .edge-panel.open { display: flex; }
    .edge-panel-title { font-size: 13px; font-weight: 600; color: #333; }
    .edge-panel-label { font-size: 12px; color: #888; }
    .edge-panel select { padding: 7px 10px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 13px; outline: none; }
    .edge-panel-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-save   { flex: 1; padding: 8px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-save:hover { background: #43a047; }
    .btn-cancel { flex: 1; padding: 8px; background: #f5f5f5; color: #555; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-cancel:hover { background: #e0e0e0; }
    .btn-delete-edge { width: 100%; padding: 8px; background: #fff0f0; color: #c62828; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .btn-delete-edge:hover { background: #ffcdd2; }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center; z-index: 300;
    }
    .modal-overlay.open { display: flex; }
    .modal-box { background: white; border-radius: 16px; padding: 28px; width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.16); }
    .modal-title { font-size: 18px; font-weight: 700; color: #222; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 14px; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #4CAF50; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-submit { flex: 1; padding: 11px; background: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .modal-submit:hover { background: #43a047; }
    .modal-submit:disabled { background: #aaa; cursor: not-allowed; }
    .modal-cancel { flex: 1; padding: 11px; background: #f5f5f5; color: #555; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .modal-cancel:hover { background: #e0e0e0; }
    .modal-error { font-size: 13px; color: #c62828; margin-top: 6px; min-height: 18px; }

    /* ── Legend ── */
    .legend {
      position: fixed; bottom: 20px; right: 20px;
      background: white; border: 1px solid #e0e0e0; border-radius: 10px;
      font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      user-select: none; z-index: 150;
    }
    .legend-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px 6px 12px; cursor: move; gap: 14px;
      border-radius: 10px 10px 0 0;
    }
    .legend-header:hover { background: #fafafa; }
    .legend-header-title { font-size: 12px; font-weight: 600; color: #555; }
    .legend-toggle {
      background: none; border: none; cursor: pointer; font-size: 15px;
      color: #bbb; line-height: 1; padding: 0; flex-shrink: 0;
    }
    .legend-toggle:hover { color: #555; }
    .legend-body { padding: 0 14px 10px; }
    .legend.collapsed .legend-body { display: none; }
    .legend.collapsed .legend-header { border-radius: 10px; }
    .legend-title { font-weight: 600; color: #333; margin-bottom: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; margin: 4px 0; color: #555; }
    .legend-dot  { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .legend-line { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: #aaa; }
    .empty-state a { color: #4CAF50; text-decoration: none; }
  </style>
</head>
<body>

<div class="header">
  <a class="brand" href="/">Word Graph</a>
  <div class="nav-links">
    <a href="/">生成图谱</a>
    <a href="/mygraph.html" class="active">我的图谱</a>
    <a href="/dashboard.html">我的词汇</a>
    <a href="/review.html">复习单词</a>
  </div>
  <span id="status"></span>
  <button class="hdr-btn hdr-btn-green"   onclick="openAddWordModal()">+ 添加词汇</button>
  <button class="hdr-btn hdr-btn-outline" onclick="openAddEdgeModal()">↔ 建立关联</button>
  <span class="username" id="username-label"></span>
  <button class="logout-btn" onclick="logout()">退出</button>
</div>

<div class="main">
  <div id="graph" style="position:relative;">
    <div class="empty-state" id="empty-state" style="display:none">
      还没有词汇，<a href="/">去探索第一个词</a>
    </div>
  </div>

  <!-- Node info panel -->
  <div class="info-panel" id="info-panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-word" id="panel-word"></div>
    <div class="panel-def"  id="panel-def"></div>
    <button class="mastered-btn" id="mastered-btn" onclick="toggleMastered()"></button>
    <a class="explore-btn" id="explore-btn" href="#">探索此词的联想 →</a>
    <hr class="panel-divider">
    <button class="btn-sm-gray" onclick="toggleConnectForm()" id="connect-toggle">+ 建立关联</button>
    <div class="connect-form" id="connect-form">
      <label>连接到</label>
      <select id="connect-target"></select>
      <label>关系类型</label>
      <select id="connect-type">
        <option value="synonym">synonym — 近义词</option>
        <option value="antonym">antonym — 反义词</option>
        <option value="collocation">collocation — 搭配</option>
        <option value="hypernym">hypernym — 上位词</option>
        <option value="hyponym">hyponym — 下位词</option>
        <option value="related">related — 相关</option>
      </select>
      <div class="connect-form-actions">
        <button class="btn-sm-gray"  onclick="toggleConnectForm()">取消</button>
        <button class="btn-sm-green" onclick="submitConnect()">确定</button>
      </div>
    </div>
  </div>
</div>

<!-- Hover tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Edge floating panel -->
<div class="edge-panel" id="edge-panel">
  <div class="edge-panel-title">边 · 关联类型</div>
  <div class="edge-panel-label" id="edge-panel-label"></div>
  <select id="edge-type-select">
    <option value="synonym">synonym — 近义词</option>
    <option value="antonym">antonym — 反义词</option>
    <option value="collocation">collocation — 搭配</option>
    <option value="hypernym">hypernym — 上位词</option>
    <option value="hyponym">hyponym — 下位词</option>
    <option value="related">related — 相关</option>
  </select>
  <div class="edge-panel-actions">
    <button class="btn-save"   onclick="saveEdgeType()">保存</button>
    <button class="btn-cancel" onclick="closeEdgePanel()">取消</button>
  </div>
  <button class="btn-delete-edge" onclick="deleteEdge()">删除此关联</button>
</div>

<!-- Add word modal -->
<div class="modal-overlay" id="add-word-modal" onclick="onOverlayClick(event,'add-word-modal')">
  <div class="modal-box">
    <div class="modal-title">添加词汇</div>
    <div class="form-group">
      <label>英文单词 *</label>
      <input id="aw-word" placeholder="如：euphoric" />
    </div>
    <div class="form-group">
      <label>中文释义（含词性）</label>
      <input id="aw-def" placeholder="如：adj. 极度兴奋的" />
    </div>
    <div class="form-group">
      <label>连接到已有词汇 *</label>
      <select id="aw-connect"></select>
    </div>
    <div class="form-group">
      <label>关系类型</label>
      <select id="aw-type">
        <option value="synonym">synonym — 近义词</option>
        <option value="antonym">antonym — 反义词</option>
        <option value="collocation">collocation — 搭配</option>
        <option value="hypernym">hypernym — 上位词</option>
        <option value="hyponym">hyponym — 下位词</option>
        <option value="related">related — 相关</option>
      </select>
    </div>
    <div class="modal-error" id="aw-error"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('add-word-modal')">取消</button>
      <button class="modal-submit" id="aw-submit" onclick="submitAddWord()">添加</button>
    </div>
  </div>
</div>

<!-- Add edge modal -->
<div class="modal-overlay" id="add-edge-modal" onclick="onOverlayClick(event,'add-edge-modal')">
  <div class="modal-box">
    <div class="modal-title">建立关联</div>
    <div class="form-group">
      <label>从</label>
      <select id="ae-from"></select>
    </div>
    <div class="form-group">
      <label>到</label>
      <select id="ae-to"></select>
    </div>
    <div class="form-group">
      <label>关系类型</label>
      <select id="ae-type">
        <option value="synonym">synonym — 近义词</option>
        <option value="antonym">antonym — 反义词</option>
        <option value="collocation">collocation — 搭配</option>
        <option value="hypernym">hypernym — 上位词</option>
        <option value="hyponym">hyponym — 下位词</option>
        <option value="related">related — 相关</option>
      </select>
    </div>
    <div class="modal-error" id="ae-error"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('add-edge-modal')">取消</button>
      <button class="modal-submit" id="ae-submit" onclick="submitAddEdge()">建立</button>
    </div>
  </div>
</div>

<div class="legend" id="legend">
  <div class="legend-header" id="legend-handle">
    <span class="legend-header-title">图例</span>
    <button class="legend-toggle" id="legend-toggle" onclick="toggleLegend(event)" title="折叠/展开">−</button>
  </div>
  <div class="legend-body">
    <div class="legend-title">节点</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1565C0"></div>探索过的词根</div>
    <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div>关联词</div>
    <div class="legend-item"><div class="legend-dot" style="background:#B0BEC5"></div>已掌握</div>
    <div class="legend-title" style="margin-top:8px;">边（点击可修改/删除）</div>
    <div class="legend-item"><div class="legend-line" style="background:#4A90D9"></div>synonym</div>
    <div class="legend-item"><div class="legend-line" style="background:#E74C3C"></div>antonym</div>
    <div class="legend-item"><div class="legend-line" style="background:#F39C12"></div>collocation</div>
    <div class="legend-item"><div class="legend-line" style="background:#9B59B6"></div>hypernym</div>
    <div class="legend-item"><div class="legend-line" style="background:#27AE60"></div>hyponym</div>
  </div>
</div>

<script>
const TYPE_COLORS = {
  synonym:'#4A90D9', antonym:'#E74C3C', collocation:'#F39C12',
  hypernym:'#9B59B6', hyponym:'#27AE60', related:'#95A5A6'
};

function getToken() { return localStorage.getItem("wg_token"); }
function authFetch(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: { "Authorization": `Bearer ${getToken()}`, "Content-Type": "application/json", ...(opts.headers || {}) }
  });
}
function logout() { localStorage.clear(); window.location.href = "/login.html"; }

if (!getToken()) window.location.href = "/login.html";
document.getElementById("username-label").textContent = localStorage.getItem("wg_username") || "";

let cy = null;
let panelWord = null;
let panelMastered = 0;
let currentEdge = null;

// ─── Graph load ───
async function load() {
  document.getElementById("status").textContent = "加载中...";
  const res = await authFetch("/user/graph-data");
  if (res.status === 401) { logout(); return; }
  const { elements } = await res.json();

  const nodeCount = elements.filter(e => !e.data.source).length;
  const edgeCount = elements.filter(e =>  e.data.source).length;

  if (nodeCount === 0) {
    document.getElementById("status").textContent = "";
    document.getElementById("empty-state").style.display = "block";
    return;
  }
  document.getElementById("status").textContent = `${nodeCount} 个词  ${edgeCount} 条关联`;

  if (cy) cy.destroy();

  const edgeStyles = Object.entries(TYPE_COLORS).map(([type, color]) => ({
    selector: `edge[type = "${type}"]`,
    style: { "line-color": color }
  }));

  cy = cytoscape({
    container: document.getElementById("graph"),
    elements,
    style: [
      {
        selector: "node",
        style: {
          label: "data(id)", "background-color": "#4CAF50", color: "white",
          "text-valign": "center", "text-halign": "center",
          "font-size": "12px", "font-weight": "bold",
          width: 65, height: 65, "text-wrap": "wrap", "text-max-width": "58px"
        }
      },
      { selector: "node[isRoot = 1]", style: { "background-color": "#1565C0", width: 85, height: 85, "font-size": "14px" } },
      { selector: "node[?mastered]",  style: { "background-color": "#B0BEC5", color: "#546E7A" } },
      {
        selector: "edge",
        style: {
          width: 2, "line-color": "#95A5A6",
          label: "data(type)", "font-size": "9px", color: "#888",
          "text-rotation": "autorotate", "text-margin-y": -7,
          "text-background-color": "white", "text-background-opacity": 0.7, "text-background-padding": "2px"
        }
      },
      ...edgeStyles
    ],
    layout: { name: "cose", padding: 50, nodeRepulsion: 6000, animate: false }
  });

  // Hover tooltip
  const tooltip = document.getElementById("tooltip");
  cy.on("mouseover", "node", e => {
    const d = e.target.data();
    tooltip.innerHTML = `<strong>${d.id}</strong>${d.definition ? "<br>" + d.definition : ""}`;
    tooltip.style.display = "block";
  });
  cy.on("mousemove", e => {
    tooltip.style.left = (e.originalEvent.clientX + 14) + "px";
    tooltip.style.top  = (e.originalEvent.clientY + 14) + "px";
  });
  cy.on("mouseout", "node", () => { tooltip.style.display = "none"; });

  // Node tap → info panel
  cy.on("tap", "node", e => {
    tooltip.style.display = "none";
    closeEdgePanel();
    const d = e.target.data();
    openPanel(d.id, d.definition, d.mastered);
  });

  // Edge tap → edge panel
  cy.on("tap", "edge", e => {
    closePanel();
    const d = e.target.data();
    openEdgePanel(d.source, d.target, d.type, e.originalEvent);
  });

  // Tap canvas → close everything
  cy.on("tap", e => {
    if (e.target === cy) { closePanel(); closeEdgePanel(); }
  });
}

// ─── Node panel ───
function openPanel(word, definition, mastered) {
  panelWord = word;
  panelMastered = mastered || 0;
  document.getElementById("panel-word").textContent = word;
  const defEl = document.getElementById("panel-def");
  defEl.textContent = definition || "暂无释义";
  defEl.className = "panel-def" + (definition ? "" : " empty");
  document.getElementById("explore-btn").href = `/?word=${encodeURIComponent(word)}`;
  updateMasteredBtn();
  // Reset connect form
  document.getElementById("connect-form").classList.remove("open");
  populateSelect("connect-target", null, word);
  document.getElementById("info-panel").classList.add("open");
}
function closePanel() {
  document.getElementById("info-panel").classList.remove("open");
}
function updateMasteredBtn() {
  const btn = document.getElementById("mastered-btn");
  btn.textContent = panelMastered ? "✓ 已掌握（点击取消）" : "标记为已掌握";
  btn.className = "mastered-btn " + (panelMastered ? "mastered" : "not-mastered");
}
async function toggleMastered() {
  panelMastered = panelMastered ? 0 : 1;
  updateMasteredBtn();
  await authFetch("/user/progress", { method: "POST", body: JSON.stringify({ word: panelWord, mastered: panelMastered }) });
  if (cy) cy.getElementById(panelWord).data("mastered", panelMastered);
}

// ─── Connect form (inside panel) ───
function toggleConnectForm() {
  const form = document.getElementById("connect-form");
  form.classList.toggle("open");
}
async function submitConnect() {
  const to   = document.getElementById("connect-target").value;
  const type = document.getElementById("connect-type").value;
  if (!panelWord || !to) return;
  await authFetch("/user/add-edge", { method: "POST", body: JSON.stringify({ from_word: panelWord, to_word: to, relation_type: type }) });
  if (cy) {
    const edgeId = `${panelWord}-${to}`;
    if (!cy.getElementById(edgeId).length) {
      cy.add({ data: { id: edgeId, source: panelWord, target: to, type } });
    }
    updateStatus();
  }
  document.getElementById("connect-form").classList.remove("open");
}

// ─── Edge panel ───
function openEdgePanel(fromWord, toWord, currentType, mouseEvent) {
  currentEdge = { from_word: fromWord, to_word: toWord };
  document.getElementById("edge-panel-label").textContent = `${fromWord}  →  ${toWord}`;
  document.getElementById("edge-type-select").value = currentType || "related";
  const panel = document.getElementById("edge-panel");
  // Keep panel inside viewport
  const x = Math.min(mouseEvent.clientX + 10, window.innerWidth  - 240);
  const y = Math.min(mouseEvent.clientY - 20,  window.innerHeight - 200);
  panel.style.left = x + "px";
  panel.style.top  = y + "px";
  panel.classList.add("open");
}
function closeEdgePanel() {
  document.getElementById("edge-panel").classList.remove("open");
  currentEdge = null;
}
async function saveEdgeType() {
  if (!currentEdge) return;
  const type = document.getElementById("edge-type-select").value;
  await authFetch("/edges", { method: "PUT", body: JSON.stringify({ ...currentEdge, relation_type: type }) });
  if (cy) {
    const edge = cy.getElementById(`${currentEdge.from_word}-${currentEdge.to_word}`);
    if (edge.length) edge.data("type", type);
  }
  closeEdgePanel();
}
async function deleteEdge() {
  if (!currentEdge) return;
  const { from_word, to_word } = currentEdge;
  await authFetch(`/edges?from_word=${encodeURIComponent(from_word)}&to_word=${encodeURIComponent(to_word)}`, { method: "DELETE" });
  if (cy) {
    cy.getElementById(`${from_word}-${to_word}`).remove();
    cy.getElementById(`${to_word}-${from_word}`).remove();
    updateStatus();
  }
  closeEdgePanel();
}

// ─── Add word modal ───
function openAddWordModal() {
  document.getElementById("aw-word").value = "";
  document.getElementById("aw-def").value  = "";
  document.getElementById("aw-error").textContent = "";
  populateSelect("aw-connect");
  document.getElementById("add-word-modal").classList.add("open");
}
async function submitAddWord() {
  const word       = document.getElementById("aw-word").value.trim();
  const definition = document.getElementById("aw-def").value.trim();
  const connect_to = document.getElementById("aw-connect").value;
  const type       = document.getElementById("aw-type").value;
  const errEl      = document.getElementById("aw-error");
  const btn        = document.getElementById("aw-submit");
  if (!word)       { errEl.textContent = "请输入单词"; return; }
  if (!connect_to) { errEl.textContent = "请选择连接词"; return; }
  btn.disabled = true; errEl.textContent = "";
  const res = await authFetch("/user/add-word", { method: "POST", body: JSON.stringify({ word, definition, connect_to, relation_type: type }) });
  btn.disabled = false;
  if (!res.ok) { const d = await res.json(); errEl.textContent = d.error || "添加失败"; return; }
  if (cy) {
    if (!cy.getElementById(word).length) {
      cy.add({ data: { id: word, definition: definition || null, mastered: 0, isRoot: 1 } });
    }
    const edgeId = `${connect_to}-${word}`;
    if (!cy.getElementById(edgeId).length) {
      cy.add({ data: { id: edgeId, source: connect_to, target: word, type } });
    }
    cy.layout({ name: "cose", padding: 50, nodeRepulsion: 6000, animate: true }).run();
    updateStatus();
  }
  closeModal("add-word-modal");
}

// ─── Add edge modal ───
function openAddEdgeModal() {
  document.getElementById("ae-error").textContent = "";
  populateSelect("ae-from");
  populateSelect("ae-to");
  document.getElementById("add-edge-modal").classList.add("open");
}
async function submitAddEdge() {
  const from_word = document.getElementById("ae-from").value;
  const to_word   = document.getElementById("ae-to").value;
  const type      = document.getElementById("ae-type").value;
  const errEl     = document.getElementById("ae-error");
  const btn       = document.getElementById("ae-submit");
  if (from_word === to_word) { errEl.textContent = "不能连接同一个词"; return; }
  btn.disabled = true; errEl.textContent = "";
  const res = await authFetch("/user/add-edge", { method: "POST", body: JSON.stringify({ from_word, to_word, relation_type: type }) });
  btn.disabled = false;
  if (!res.ok) { const d = await res.json(); errEl.textContent = d.error || "建立失败"; return; }
  if (cy) {
    const edgeId = `${from_word}-${to_word}`;
    if (!cy.getElementById(edgeId).length) {
      cy.add({ data: { id: edgeId, source: from_word, target: to_word, type } });
    }
    updateStatus();
  }
  closeModal("add-edge-modal");
}

// ─── Helpers ───
function populateSelect(selectId, excludeWord = null, skipWord = null) {
  if (!cy) return;
  const sel = document.getElementById(selectId);
  const words = cy.nodes().map(n => n.data("id")).sort()
    .filter(w => w !== excludeWord && w !== skipWord);
  sel.innerHTML = words.map(w => `<option value="${w}">${w}</option>`).join("");
}
function updateStatus() {
  if (!cy) return;
  document.getElementById("status").textContent =
    `${cy.nodes().length} 个词  ${cy.edges().length} 条关联`;
}
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function onOverlayClick(e, id) { if (e.target.id === id) closeModal(id); }

// ─── Legend: drag + edge-snap collapse ───
(function() {
  const legend = document.getElementById("legend");
  const handle = document.getElementById("legend-handle");
  const toggleBtn = document.getElementById("legend-toggle");
  const EDGE_THRESHOLD = 80;
  let dragging = false, offX = 0, offY = 0;

  handle.addEventListener("mousedown", e => {
    if (toggleBtn.contains(e.target)) return;
    dragging = true;
    const rect = legend.getBoundingClientRect();
    // Convert from bottom/right to top/left so we can move it freely
    legend.style.bottom = "auto";
    legend.style.right  = "auto";
    legend.style.left   = rect.left + "px";
    legend.style.top    = rect.top  + "px";
    offX = e.clientX - rect.left;
    offY = e.clientY - rect.top;
    e.preventDefault();
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const x = Math.max(0, Math.min(window.innerWidth  - legend.offsetWidth,  e.clientX - offX));
    const y = Math.max(0, Math.min(window.innerHeight - legend.offsetHeight, e.clientY - offY));
    legend.style.left = x + "px";
    legend.style.top  = y + "px";
  });

  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    const r = legend.getBoundingClientRect();
    const nearEdge = r.left < EDGE_THRESHOLD
      || r.right  > window.innerWidth  - EDGE_THRESHOLD
      || r.top    < EDGE_THRESHOLD
      || r.bottom > window.innerHeight - EDGE_THRESHOLD;
    if (nearEdge && !legend.classList.contains("collapsed")) {
      legend.classList.add("collapsed");
      toggleBtn.textContent = "+";
    }
  });
})();

function toggleLegend(e) {
  e.stopPropagation();
  const legend    = document.getElementById("legend");
  const toggleBtn = document.getElementById("legend-toggle");
  const collapsed = legend.classList.toggle("collapsed");
  toggleBtn.textContent = collapsed ? "+" : "−";
}

load();
