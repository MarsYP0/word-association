<!DOCTYPE html>
<html>
<head>
  <title>Word Graph</title>
  <meta charset="utf-8">
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }

    .header {
      padding: 0 20px;
      height: 54px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .header .brand { font-size: 16px; font-weight: 700; color: #333; margin-right: 8px; text-decoration: none; }
    .header input {
      padding: 7px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 20px;
      font-size: 14px;
      width: 200px;
      outline: none;
    }
    .header input:focus { border-color: #4CAF50; }
    .header button {
      padding: 7px 18px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }
    .header button:hover { background: #43a047; }
    .header button:disabled { background: #aaa; cursor: not-allowed; }
    #status { font-size: 13px; color: #888; flex: 1; }
    .nav-links { display: flex; gap: 14px; align-items: center; }
    .nav-links a { font-size: 13px; color: #555; text-decoration: none; }
    .nav-links a:hover { color: #4CAF50; }
    .username { font-size: 13px; color: #333; font-weight: 600; }
    .logout-btn { font-size: 13px; color: #888; cursor: pointer; background: none; border: none; }
    .logout-btn:hover { color: #E74C3C; }

    .main { display: flex; flex: 1; overflow: hidden; }
    #graph { flex: 1; }

    /* Info Panel */
    .info-panel {
      width: 260px;
      background: white;
      border-left: 1px solid #e0e0e0;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .info-panel.open { display: flex; }
    .panel-close { align-self: flex-end; cursor: pointer; color: #aaa; font-size: 18px; line-height: 1; background: none; border: none; }
    .panel-close:hover { color: #333; }
    .panel-word { font-size: 26px; font-weight: 700; color: #1565C0; }
    .panel-def { font-size: 14px; color: #555; line-height: 1.6; }
    .panel-def.empty { color: #bbb; font-style: italic; }
    .mastered-btn {
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .mastered-btn.not-mastered { background: #e8f5e9; color: #388e3c; }
    .mastered-btn.not-mastered:hover { background: #c8e6c9; }
    .mastered-btn.mastered { background: #f5f5f5; color: #888; }
    .mastered-btn.mastered:hover { background: #ffebee; color: #c62828; }
    .explore-btn {
      padding: 9px;
      border-radius: 8px;
      border: 1px solid #d0d0d0;
      background: white;
      cursor: pointer;
      font-size: 13px;
      color: #555;
    }
    .explore-btn:hover { border-color: #4CAF50; color: #4CAF50; }

    /* Legend */
    .legend {
      position: fixed; bottom: 20px; right: 20px;
      background: white; border: 1px solid #e0e0e0; border-radius: 10px;
      font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      user-select: none; z-index: 150;
    }
    .legend-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px 6px 12px; cursor: move; gap: 14px;
      border-radius: 10px 10px 0 0;
    }
    .legend-header:hover { background: #fafafa; }
    .legend-header-title { font-size: 12px; font-weight: 600; color: #555; }
    .legend-toggle {
      background: none; border: none; cursor: pointer; font-size: 15px;
      color: #bbb; line-height: 1; padding: 0; flex-shrink: 0;
    }
    .legend-toggle:hover { color: #555; }
    .legend-body { padding: 0 14px 10px; }
    .legend.collapsed .legend-body { display: none; }
    .legend.collapsed .legend-header { border-radius: 10px; }
    .legend-title { font-weight: 600; color: #333; margin-bottom: 6px; }
    .legend-item { display: flex; align-items: center; gap: 7px; margin: 4px 0; color: #555; }
    .legend-line { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    .zoom-controls {
      position: fixed; bottom: 140px; right: 20px;
      display: flex; flex-direction: column; gap: 4px; z-index: 150;
    }
    .zoom-btn {
      width: 32px; height: 32px; background: white; border: 1px solid #e0e0e0;
      border-radius: 8px; cursor: pointer; font-size: 16px; line-height: 1;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center;
    }
    .zoom-btn:hover { background: #f5f5f5; border-color: #bbb; }
  </style>
</head>
<body>

<div class="header">
  <a class="brand" href="/">Word Graph</a>
  <input id="word" placeholder="Enter a word..." onkeydown="if(event.key==='Enter') loadGraph()" />
  <button id="btn" onclick="loadGraph()">Generate</button>
  <span id="status"></span>
  <div class="nav-links">
    <a href="/mygraph.html">我的图谱</a>
    <a href="/dashboard.html">我的词汇</a>
    <a href="/review.html">复习单词</a>
    <a href="/domain.html">领域图谱</a>
    <span class="username" id="username-label"></span>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
</div>

<div class="main">
  <div id="graph"></div>

  <div class="info-panel" id="info-panel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-word" id="panel-word"></div>
    <div class="panel-def" id="panel-def"></div>
    <button class="mastered-btn" id="mastered-btn" onclick="toggleMastered()"></button>
    <button class="explore-btn" onclick="exploreWord()">探索此词的联想 →</button>
  </div>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" onclick="if(cy)cy.zoom({level:cy.zoom()*1.25,renderedPosition:{x:cy.width()/2,y:cy.height()/2}})" title="放大">+</button>
  <button class="zoom-btn" onclick="if(cy)cy.zoom({level:cy.zoom()/1.25,renderedPosition:{x:cy.width()/2,y:cy.height()/2}})" title="缩小">−</button>
  <button class="zoom-btn" onclick="if(cy)cy.animate({fit:{eles:cy.elements(),padding:40}},{duration:300})" title="适配窗口" style="font-size:13px;">⊡</button>
</div>

<div class="legend" id="legend">
  <div class="legend-header" id="legend-handle">
    <span class="legend-header-title">图例</span>
    <button class="legend-toggle" id="legend-toggle" onclick="toggleLegend(event)" title="折叠/展开">−</button>
  </div>
  <div class="legend-body">
    <div class="legend-title">Edge Types</div>
    <div class="legend-item"><div class="legend-line" style="background:#4A90D9"></div>synonym 近义词</div>
    <div class="legend-item"><div class="legend-line" style="background:#E74C3C"></div>antonym 反义词</div>
    <div class="legend-item"><div class="legend-line" style="background:#F39C12"></div>collocation 搭配</div>
    <div class="legend-item"><div class="legend-line" style="background:#9B59B6"></div>hypernym 上位词</div>
    <div class="legend-item"><div class="legend-line" style="background:#27AE60"></div>hyponym 下位词</div>
    <div class="legend-item"><div class="legend-line" style="background:#95A5A6"></div>related 相关</div>
  </div>
</div>

<script>
const TYPE_COLORS = {
  synonym: '#4A90D9', antonym: '#E74C3C', collocation: '#F39C12',
  hypernym: '#9B59B6', hyponym: '#27AE60', related: '#95A5A6'
};

// Auth helpers
function getToken() { return localStorage.getItem("wg_token"); }
function authHeaders() { return { "Authorization": `Bearer ${getToken()}`, "Content-Type": "application/json" }; }
function logout() { localStorage.clear(); window.location.href = "/login.html"; }

// Auth check
if (!getToken()) window.location.href = "/login.html";
document.getElementById("username-label").textContent = localStorage.getItem("wg_username") || "";

let cy = null;
let currentWord = null;
let panelWord = null;
let panelMastered = 0;

// Pre-fill word from URL param
const urlWord = new URLSearchParams(location.search).get("word");
if (urlWord) {
  document.getElementById("word").value = urlWord;
  window.addEventListener("load", () => loadGraph());
}

async function loadGraph(targetWord) {
  const word = targetWord || document.getElementById("word").value.trim();
  if (!word) return;

  document.getElementById("word").value = word;
  currentWord = word;
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.textContent = "生成中...";
  closePanel();

  try {
    const res = await fetch(`/graph?text=${encodeURIComponent(word)}`, {
      headers: authHeaders()
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();

    const edgeCount = data.elements.filter(e => e.data.source).length;
    status.textContent = `${edgeCount} 个关联词`;

    if (cy) cy.destroy();

    const edgeStyles = Object.entries(TYPE_COLORS).map(([type, color]) => ({
      selector: `edge[type = "${type}"]`,
      style: { "line-color": color }
    }));

    cy = cytoscape({
      container: document.getElementById("graph"),
      elements: data.elements,
      style: [
        {
          selector: "node",
          style: {
            label: "data(id)",
            "background-color": "#4CAF50",
            color: "white",
            "text-valign": "center",
            "text-halign": "center",
            "font-size": "13px",
            "font-weight": "bold",
            width: 75, height: 75,
            "text-wrap": "wrap",
            "text-max-width": "65px",
            "border-width": 0
          }
        },
        {
          selector: "node[?mastered]",
          style: { "background-color": "#B0BEC5", color: "#546E7A" }
        },
        {
          selector: `node[id = "${word}"]`,
          style: { "background-color": "#1565C0", width: 95, height: 95, "font-size": "15px" }
        },
        {
          selector: "edge",
          style: {
            width: 2.5,
            "line-color": "#95A5A6",
            label: "data(type)",
            "font-size": "10px",
            color: "#777",
            "text-rotation": "autorotate",
            "text-margin-y": -8,
            "text-background-color": "white",
            "text-background-opacity": 0.75,
            "text-background-padding": "2px"
          }
        },
        ...edgeStyles
      ],
      layout: { name: "cose", padding: 60, nodeRepulsion: 8000 }
    });

    cy.on("tap", "node", (e) => {
      const node = e.target;
      openPanel(node.data("id"), node.data("definition"), node.data("mastered"));
    });

  } catch (err) {
    status.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
}

function openPanel(word, definition, mastered) {
  panelWord = word;
  panelMastered = mastered || 0;
  document.getElementById("panel-word").textContent = word;
  const defEl = document.getElementById("panel-def");
  defEl.textContent = definition || "暂无释义";
  defEl.className = "panel-def" + (definition ? "" : " empty");
  updateMasteredBtn();
  document.getElementById("info-panel").classList.add("open");
}

function closePanel() {
  document.getElementById("info-panel").classList.remove("open");
}

function updateMasteredBtn() {
  const btn = document.getElementById("mastered-btn");
  btn.textContent = panelMastered ? "✓ 已掌握（点击取消）" : "标记为已掌握";
  btn.className = "mastered-btn " + (panelMastered ? "mastered" : "not-mastered");
}

async function toggleMastered() {
  panelMastered = panelMastered ? 0 : 1;
  updateMasteredBtn();
  await fetch("/user/progress", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ word: panelWord, mastered: panelMastered })
  });
  // Update node color in graph
  if (cy) {
    const node = cy.getElementById(panelWord);
    if (node) {
      node.data("mastered", panelMastered);
    }
  }
}

function exploreWord() {
  if (panelWord) {
    closePanel();
    loadGraph(panelWord);
  }
}

// ─── Legend: drag + edge-snap collapse ───
(function() {
  const legend = document.getElementById("legend");
  const handle = document.getElementById("legend-handle");
  const toggleBtn = document.getElementById("legend-toggle");
  const EDGE_THRESHOLD = 80;
  let dragging = false, offX = 0, offY = 0;

  handle.addEventListener("mousedown", e => {
    if (toggleBtn.contains(e.target)) return;
    dragging = true;
    const rect = legend.getBoundingClientRect();
    legend.style.bottom = "auto";
    legend.style.right  = "auto";
    legend.style.left   = rect.left + "px";
    legend.style.top    = rect.top  + "px";
    offX = e.clientX - rect.left;
    offY = e.clientY - rect.top;
    e.preventDefault();
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const x = Math.max(0, Math.min(window.innerWidth  - legend.offsetWidth,  e.clientX - offX));
    const y = Math.max(0, Math.min(window.innerHeight - legend.offsetHeight, e.clientY - offY));
    legend.style.left = x + "px";
    legend.style.top  = y + "px";
  });

  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    const r = legend.getBoundingClientRect();
    const nearEdge = r.left < EDGE_THRESHOLD
      || r.right  > window.innerWidth  - EDGE_THRESHOLD
      || r.top    < EDGE_THRESHOLD
      || r.bottom > window.innerHeight - EDGE_THRESHOLD;
    if (nearEdge && !legend.classList.contains("collapsed")) {
      legend.classList.add("collapsed");
      toggleBtn.textContent = "+";
    }
  });
})();

function toggleLegend(e) {
  e.stopPropagation();
  const legend    = document.getElementById("legend");
  const toggleBtn = document.getElementById("legend-toggle");
  const collapsed = legend.classList.toggle("collapsed");
  toggleBtn.textContent = collapsed ? "+" : "−";
}
</script>

</body>
</html>
