<!DOCTYPE html>
<html>
<head>
  <title>Word Graph — 我的词汇</title>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; }

    .header {
      padding: 0 24px;
      height: 54px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .brand { font-size: 16px; font-weight: 700; color: #333; text-decoration: none; }
    .nav-links { display: flex; gap: 16px; flex: 1; }
    .nav-links a { font-size: 13px; color: #555; text-decoration: none; }
    .nav-links a:hover { color: #4CAF50; }
    .nav-links a.active { color: #4CAF50; font-weight: 600; }
    .username { font-size: 13px; color: #333; font-weight: 600; }
    .logout-btn { font-size: 13px; color: #888; cursor: pointer; background: none; border: none; }
    .logout-btn:hover { color: #E74C3C; }

    .content { max-width: 960px; margin: 32px auto; padding: 0 20px; }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-title { font-size: 22px; font-weight: 700; color: #222; }
    .new-btn {
      padding: 9px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
    }
    .new-btn:hover { background: #43a047; }

    .stats { display: flex; gap: 14px; margin-bottom: 24px; }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 16px 22px;
      flex: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-num { font-size: 30px; font-weight: 700; color: #1565C0; }
    .stat-label { font-size: 12px; color: #888; margin-top: 3px; }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      padding: 8px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }
    .search-input:focus { border-color: #4CAF50; }
    .filter-btn {
      padding: 7px 14px;
      border-radius: 16px;
      border: 1px solid #ddd;
      background: white;
      font-size: 13px;
      color: #555;
      cursor: pointer;
    }
    .filter-btn.active { background: #1565C0; color: white; border-color: #1565C0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .word-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .word-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.10); }
    .word-card.mastered { opacity: 0.65; }

    .word-link { text-decoration: none; display: block; padding-right: 20px; }
    .word-text { font-size: 20px; font-weight: 700; color: #1565C0; margin-bottom: 6px; }
    .word-def {
      font-size: 12px;
      color: #777;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .mastered-badge { font-size: 12px; color: #4CAF50; font-weight: 600; }
    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 15px;
      padding: 2px 4px;
      line-height: 1;
      border-radius: 4px;
    }
    .delete-btn:hover { color: #E74C3C; background: #fff0f0; }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #aaa;
      padding: 60px 0;
      font-size: 15px;
    }
    .empty a { color: #4CAF50; text-decoration: none; }

    .domain-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .domain-filter-btn {
      padding: 5px 14px; border-radius: 16px; border: 1.5px solid #e0e0e0;
      background: white; font-size: 12px; color: #555; cursor: pointer;
      font-weight: 500; transition: all 0.15s;
    }
    .domain-filter-btn:hover { border-color: #aaa; }
    .domain-filter-btn.active { color: white; border-color: transparent; }
  </style>
</head>
<body>

<div class="header">
  <a class="brand" href="/">Word Graph</a>
  <div class="nav-links">
    <a href="/">生成图谱</a>
    <a href="/mygraph.html">我的图谱</a>
    <a href="/dashboard.html" class="active">我的词汇</a>
    <a href="/review.html">复习单词</a>
    <a href="/domain.html">领域图谱</a>
  </div>
  <span class="username" id="username-label"></span>
  <button class="logout-btn" onclick="logout()">退出</button>
</div>

<div class="content">
  <div class="page-header">
    <div class="page-title">我的词汇库</div>
    <a class="new-btn" href="/">+ 探索新词</a>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-words">—</div>
      <div class="stat-label">收录单词</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-mastered">—</div>
      <div class="stat-label">已掌握</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-pct">—</div>
      <div class="stat-label">掌握率</div>
    </div>
  </div>

  <div class="domain-filter" id="domain-filter"></div>

  <div class="toolbar">
    <input class="search-input" id="search" placeholder="搜索单词..." oninput="render()" />
    <button class="filter-btn active" onclick="setMasteryFilter('all', this)">全部</button>
    <button class="filter-btn" onclick="setMasteryFilter('unmastered', this)">未掌握</button>
    <button class="filter-btn" onclick="setMasteryFilter('mastered', this)">已掌握</button>
  </div>

  <div class="grid" id="grid">
    <div class="empty">加载中...</div>
  </div>
</div>

<script>
function getToken() { return localStorage.getItem("wg_token"); }
function authHeaders() { return { "Authorization": `Bearer ${getToken()}` }; }
function logout() { localStorage.clear(); window.location.href = "/login.html"; }

if (!getToken()) window.location.href = "/login.html";
document.getElementById("username-label").textContent = localStorage.getItem("wg_username") || "";

let allWords = [];
let masteryFilter = "all";
let activeDomainId = null;
let userDomains = [];

async function load() {
  const [wordsRes, domainsRes] = await Promise.all([
    fetch("/user/words", { headers: authHeaders() }),
    fetch("/user/domains", { headers: authHeaders() })
  ]);
  if (wordsRes.status === 401) { logout(); return; }

  const { words } = await wordsRes.json();
  const { domains } = await domainsRes.json();

  allWords = words;
  userDomains = domains || [];
  renderDomainFilter();
  updateStats();
  render();
}

function renderDomainFilter() {
  const el = document.getElementById("domain-filter");
  if (!userDomains.length) { el.style.display = "none"; return; }
  el.style.display = "flex";
  el.innerHTML = `
    <button class="domain-filter-btn active" id="dfbtn-all"
      style="background:#555;border-color:transparent;color:white"
      onclick="setDomainFilter(null, this)">全部领域</button>
    ${userDomains.map(d => `
      <button class="domain-filter-btn" id="dfbtn-${d.id}"
        onclick="setDomainFilter(${d.id}, this)"
        data-color="${d.color}">${d.name}</button>
    `).join("")}`;
}

async function setDomainFilter(domainId, el) {
  activeDomainId = domainId;

  document.querySelectorAll(".domain-filter-btn").forEach(b => {
    b.classList.remove("active");
    b.style.background = "";
    b.style.borderColor = "";
    b.style.color = "";
  });
  el.classList.add("active");
  el.style.background = domainId
    ? (el.dataset.color || "#555")
    : "#555";
  el.style.borderColor = "transparent";
  el.style.color = "white";

  if (domainId) {
    const res = await fetch(`/user/words?domain_id=${domainId}`, { headers: authHeaders() });
    const { words } = await res.json();
    allWords = words;
  } else {
    const res = await fetch("/user/words", { headers: authHeaders() });
    const { words } = await res.json();
    allWords = words;
  }
  updateStats();
  render();
}

function setMasteryFilter(f, el) {
  masteryFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  render();
}

function updateStats() {
  const total = allWords.length;
  const mastered = allWords.filter(w => w.mastered).length;
  document.getElementById("stat-words").textContent = total;
  document.getElementById("stat-mastered").textContent = mastered;
  document.getElementById("stat-pct").textContent = total ? Math.round(mastered / total * 100) + "%" : "0%";
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  let words = allWords;
  if (masteryFilter === "unmastered") words = words.filter(w => !w.mastered);
  if (masteryFilter === "mastered")   words = words.filter(w => w.mastered);
  if (q) words = words.filter(w => w.word.toLowerCase().includes(q));

  const grid = document.getElementById("grid");
  if (words.length === 0) {
    grid.innerHTML = allWords.length === 0
      ? `<div class="empty">词汇库还是空的，<a href="/">去探索第一个词</a></div>`
      : `<div class="empty">没有匹配的单词</div>`;
    return;
  }

  grid.innerHTML = words.map(w => `
    <div class="word-card${w.mastered ? " mastered" : ""}">
      <a class="word-link" href="/?word=${encodeURIComponent(w.word)}">
        <div class="word-text">${w.word}</div>
        <div class="word-def">${w.definition || "暂无释义"}</div>
      </a>
      <div class="card-footer">
        <span class="mastered-badge">${w.mastered ? "✓ 已掌握" : ""}</span>
        <button class="delete-btn" onclick="deleteWord(event, '${w.word.replace(/'/g, "\\'")}')" title="删除">✕</button>
      </div>
    </div>
  `).join("");
}

async function deleteWord(e, word) {
  e.preventDefault();
  e.stopPropagation();
  if (!confirm(`确定删除「${word}」？`)) return;
  const res = await fetch(`/user/words?word=${encodeURIComponent(word)}`, {
    method: "DELETE",
    headers: authHeaders()
  });
  if (!res.ok) return;
  allWords = allWords.filter(w => w.word !== word);
  updateStats();
  render();
}

load();
</script>

</body>
</html>
