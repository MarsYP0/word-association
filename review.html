<!DOCTYPE html>
<html>
<head>
  <title>Word Graph — 复习单词</title>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; }

    .header {
      padding: 0 24px;
      height: 54px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .brand { font-size: 16px; font-weight: 700; color: #333; text-decoration: none; }
    .nav-links { display: flex; gap: 16px; flex: 1; }
    .nav-links a { font-size: 13px; color: #555; text-decoration: none; }
    .nav-links a:hover { color: #4CAF50; }
    .nav-links a.active { color: #4CAF50; font-weight: 600; }
    .username { font-size: 13px; color: #333; font-weight: 600; }
    .logout-btn { font-size: 13px; color: #888; cursor: pointer; background: none; border: none; }
    .logout-btn:hover { color: #E74C3C; }

    .content {
      max-width: 560px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Progress bar */
    .progress-bar-wrap {
      background: #e0e0e0;
      border-radius: 8px;
      height: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #4CAF50;
      height: 100%;
      border-radius: 8px;
      transition: width 0.4s ease;
    }
    .progress-text {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }
    .progress-text strong { color: #333; }

    /* Flashcard */
    .card-wrap {
      perspective: 1000px;
      height: 280px;
      margin-bottom: 24px;
      cursor: pointer;
    }
    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.09);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card-back { transform: rotateY(180deg); }

    .card-word { font-size: 42px; font-weight: 800; color: #1565C0; margin-bottom: 12px; }
    .flip-hint { font-size: 13px; color: #bbb; }

    .card-def { font-size: 18px; color: #333; text-align: center; line-height: 1.7; margin-bottom: 8px; }
    .card-word-sm { font-size: 22px; font-weight: 700; color: #1565C0; margin-bottom: 16px; }

    /* Action buttons */
    .actions { display: flex; gap: 12px; justify-content: center; }
    .action-btn {
      flex: 1;
      max-width: 160px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-mastered { background: #e8f5e9; color: #388e3c; }
    .btn-mastered:hover { background: #c8e6c9; }
    .btn-learning { background: #fff3e0; color: #e65100; }
    .btn-learning:hover { background: #ffe0b2; }
    .btn-skip { background: #f5f5f5; color: #888; font-size: 13px; padding: 10px; flex: none; width: 80px; }
    .btn-skip:hover { background: #eeeeee; }

    /* Done state */
    .done {
      text-align: center;
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.09);
      padding: 60px 32px;
      display: none;
    }
    .done-icon { font-size: 52px; margin-bottom: 16px; }
    .done-title { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 8px; }
    .done-sub { font-size: 14px; color: #888; margin-bottom: 24px; }
    .restart-btn {
      padding: 12px 28px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      margin-right: 10px;
    }
    .restart-btn:hover { background: #43a047; }
    .dashboard-btn {
      padding: 12px 28px;
      background: white;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 20px;
      cursor: pointer;
      font-size: 15px;
      text-decoration: none;
      display: inline-block;
    }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; }
    .filter-tab {
      padding: 6px 16px;
      border-radius: 16px;
      border: 1px solid #ddd;
      background: white;
      font-size: 13px;
      color: #555;
      cursor: pointer;
    }
    .filter-tab.active { background: #1565C0; color: white; border-color: #1565C0; }
  </style>
</head>
<body>

<div class="header">
  <a class="brand" href="/">Word Graph</a>
  <div class="nav-links">
    <a href="/">生成图谱</a>
    <a href="/mygraph.html">我的图谱</a>
    <a href="/dashboard.html">我的词汇</a>
    <a href="/review.html" class="active">复习单词</a>
  </div>
  <span class="username" id="username-label"></span>
  <button class="logout-btn" onclick="logout()">退出</button>
</div>

<div class="content">
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all', this)">全部</button>
    <button class="filter-tab" onclick="setFilter('unmastered', this)">未掌握</button>
    <button class="filter-tab" onclick="setFilter('mastered', this)">已掌握</button>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-text" id="progress-text">加载中...</div>

  <div class="card-wrap" id="card-wrap" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="card-word" id="front-word"></div>
        <div class="flip-hint">点击查看释义</div>
      </div>
      <div class="card-face card-back">
        <div class="card-word-sm" id="back-word"></div>
        <div class="card-def" id="back-def"></div>
      </div>
    </div>
  </div>

  <div class="actions" id="actions">
    <button class="action-btn btn-learning" onclick="answer(false)">还没掌握 ↩</button>
    <button class="action-btn btn-skip" onclick="skip()">跳过</button>
    <button class="action-btn btn-mastered" onclick="answer(true)">已掌握 ✓</button>
  </div>

  <div class="done" id="done">
    <div class="done-icon">🎉</div>
    <div class="done-title" id="done-title">复习完成！</div>
    <div class="done-sub" id="done-sub"></div>
    <button class="restart-btn" onclick="restart()">再来一轮</button>
    <a class="dashboard-btn" href="/dashboard.html">返回图谱</a>
  </div>
</div>

<script>
function getToken() { return localStorage.getItem("wg_token"); }
function authHeaders() { return { "Authorization": `Bearer ${getToken()}`, "Content-Type": "application/json" }; }
function logout() { localStorage.clear(); window.location.href = "/login.html"; }

if (!getToken()) window.location.href = "/login.html";
document.getElementById("username-label").textContent = localStorage.getItem("wg_username") || "";

let allWords = [];
let queue = [];
let currentIndex = 0;
let masteredCount = 0;
let filter = "all";

async function load() {
  const res = await fetch("/user/words", { headers: authHeaders() });
  if (res.status === 401) { logout(); return; }
  const { words } = await res.json();
  allWords = words;
  buildQueue();
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  buildQueue();
}

function buildQueue() {
  let filtered = allWords;
  if (filter === "unmastered") filtered = allWords.filter(w => !w.mastered);
  if (filter === "mastered")   filtered = allWords.filter(w => w.mastered);

  // Shuffle
  queue = [...filtered].sort(() => Math.random() - 0.5);
  currentIndex = 0;
  masteredCount = allWords.filter(w => w.mastered).length;

  document.getElementById("done").style.display = "none";
  document.getElementById("card-wrap").style.display = "block";
  document.getElementById("actions").style.display = "flex";

  if (queue.length === 0) {
    showDone(filtered.length === 0 ? "empty" : "all");
  } else {
    showCard();
  }
}

function restart() {
  buildQueue();
}

function showCard() {
  const w = queue[currentIndex];
  document.getElementById("front-word").textContent = w.word;
  document.getElementById("back-word").textContent  = w.word;
  document.getElementById("back-def").textContent   = w.definition || "暂无释义";
  document.getElementById("card").classList.remove("flipped");
  updateProgress();
}

function flipCard() {
  document.getElementById("card").classList.toggle("flipped");
}

function updateProgress() {
  const total = queue.length;
  const done = currentIndex;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").innerHTML =
    `<strong>${masteredCount}</strong> / ${allWords.length} 已掌握 &nbsp;·&nbsp; 本轮 ${done} / ${total}`;
}

async function answer(mastered) {
  const w = queue[currentIndex];
  const wasAlreadyMastered = w.mastered;

  await fetch("/user/progress", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ word: w.word, mastered })
  });

  // Update local state
  const rec = allWords.find(x => x.word === w.word);
  if (rec) {
    const wasMastered = rec.mastered;
    rec.mastered = mastered ? 1 : 0;
    if (!wasMastered && mastered) masteredCount++;
    if (wasMastered && !mastered) masteredCount--;
  }

  next();
}

function skip() { next(); }

function next() {
  currentIndex++;
  if (currentIndex >= queue.length) {
    showDone("round");
  } else {
    showCard();
  }
}

function showDone(reason) {
  document.getElementById("card-wrap").style.display = "none";
  document.getElementById("actions").style.display = "none";
  const done = document.getElementById("done");
  done.style.display = "block";

  if (reason === "empty") {
    document.getElementById("done-title").textContent = "还没有单词";
    document.getElementById("done-sub").textContent = "先去生成一些词汇图谱吧";
  } else {
    const total = allWords.length;
    document.getElementById("done-title").textContent = "本轮复习完成！";
    document.getElementById("done-sub").textContent =
      `已掌握 ${masteredCount} / ${total} 个单词（${Math.round(masteredCount/total*100) || 0}%）`;
  }
}

load();
</script>

</body>
</html>
